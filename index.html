html, body { height: 100%; margin: 0; font-family: 'Outfit', sans-serif; }

.rosco-container { position: relative; width: 340px; height: 340px; margin: 0 auto; }

.letter-node {
  position: absolute; width: 36px; height: 36px; border-radius: 50%;

  font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px;

.letter-node.incorrect { background: #dc2626; border-color: #f87171; color: #fff; }
.letter-node.pending { background: #d97706; border-color: #fbbf24; color: #fff; }
.letter-node.active {
  background: #2563eb; border-color: #60a5fa; color: #fff;

.btn-secondary {

.input-answer {

let roscoNames = ['Rosco 1', 'Rosco 2', 'Rosco 3'];

// ============= GAME STATE =============
let currentRosco = 0;
let gameState = 'idle'; // idle, playing, paused, finished
let letterStates = []; // 'unanswered','correct','incorrect','pending'
let currentIndex = 0;
let score = 0, corrects = 0, incorrects = 0;
let timeLeft = 300;
let timerInterval = null;
const TOTAL_TIME = 300;

// ============= NORMALIZE =============
function normalize(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'').trim();
}

// ============= ROSCO RENDERING =============
function renderRosco() {
  const container = document.getElementById('roscoContainer');
  // Remove old letter nodes
  container.querySelectorAll('.letter-node').forEach(n => n.remove());

  const letters = ROSCOS[currentRosco];
  const count = letters.length;
  const rect = container.getBoundingClientRect();
  const w = rect.width || 340, h = rect.height || 340;
  const cx = w / 2, cy = h / 2;
  const nodeSize = w > 400 ? 42 : 36;
  const radius = (Math.min(w, h) / 2) - nodeSize / 2 - 4;

  letters.forEach((item, i) => {
    const angle = (2 * Math.PI * i / count) - Math.PI / 2;
    const x = cx + radius * Math.cos(angle) - nodeSize / 2;
    const y = cy + radius * Math.sin(angle) - nodeSize / 2;

    const node = document.createElement('div');
    node.className = 'letter-node';
    node.id = 'node-' + i;
    node.textContent = item.l;
    node.style.left = x + 'px';
    node.style.top = y + 'px';
    node.style.width = nodeSize + 'px';
    node.style.height = nodeSize + 'px';
    container.appendChild(node);
  });
  updateRoscoVisuals();
}

function updateRoscoVisuals() {
  const letters = ROSCOS[currentRosco];
  letters.forEach((_, i) => {
    const node = document.getElementById('node-' + i);
    if (!node) return;
    node.className = 'letter-node';
    if (letterStates[i] === 'correct') node.classList.add('correct');
    else if (letterStates[i] === 'incorrect') node.classList.add('incorrect');
    else if (letterStates[i] === 'pending') node.classList.add('pending');
    if (i === currentIndex && gameState === 'playing') node.classList.add('active');
  });
}

// ============= TIMER =============
function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timerText').textContent = m + ':' + String(s).padStart(2, '0');
  const circle = document.getElementById('timerCircle');
  const circumference = 326.73;
  const offset = circumference * (1 - timeLeft / TOTAL_TIME);
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = timeLeft <= 30 ? '#ef4444' : timeLeft <= 60 ? '#f59e0b' : '#60a5fa';
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (gameState !== 'playing') return;
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); endGame(); }
  }, 1000);
}

// ============= SCORES =============
function updateScores() {
  document.getElementById('correctCount').textContent = corrects;
  document.getElementById('incorrectCount').textContent = incorrects;
  const pend = letterStates.filter(s => s === 'unanswered' || s === 'pending').length;
  document.getElementById('pendingCount').textContent = pend;
  document.getElementById('scoreDisplay').textContent = score;
}

// ============= NAVIGATION =============
function findNextIndex() {
  const len = ROSCOS[currentRosco].length;
  for (let step = 1; step <= len; step++) {
    const idx = (currentIndex + step) % len;
    if (letterStates[idx] === 'unanswered' || letterStates[idx] === 'pending') return idx;
  }
  return -1;
}

function showCurrentLetter() {
  if (currentIndex < 0) { endGame(); return; }
  const item = ROSCOS[currentRosco][currentIndex];
  document.getElementById('definitionText').innerHTML =
    '<span class="text-blue-400 font-bold text-xl mr-2">' + item.l + '</span> ' + item.d;
  updateRoscoVisuals();
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').focus();
}

// ============= ACTIONS =============
function submitAnswer() {
  if (gameState !== 'playing') return;
  const input = document.getElementById('answerInput');
  const answer = normalize(input.value);
  const correct = normalize(ROSCOS[currentRosco][currentIndex].a);
  const defBox = document.getElementById('definitionBox');

  if (!answer) return;

  if (answer === correct) {
    letterStates[currentIndex] = 'correct';
    corrects++; score++;
    defBox.classList.remove('flash-incorrect');
    defBox.classList.add('flash-correct');
    setTimeout(() => defBox.classList.remove('flash-correct'), 400);
  } else {
    letterStates[currentIndex] = 'incorrect';
    incorrects++; score--;
    defBox.classList.remove('flash-correct');
    defBox.classList.add('flash-incorrect');
    setTimeout(() => defBox.classList.remove('flash-incorrect'), 400);
  }

  updateScores();
  const next = findNextIndex();
  if (next === -1) { endGame(); return; }
  currentIndex = next;
  showCurrentLetter();
}

function passWord() {
  if (gameState !== 'playing') return;
  if (letterStates[currentIndex] === 'unanswered') letterStates[currentIndex] = 'pending';
  const next = findNextIndex();
  if (next === -1) { endGame(); return; }
  currentIndex = next;
  showCurrentLetter();
  updateScores();
}

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    document.getElementById('pauseOverlay').classList.remove('hidden');
    document.getElementById('answerInput').disabled = true;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('passBtn').disabled = true;
    document.getElementById('pauseBtn').innerHTML = '<i data-lucide="play" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i> Reanudar';
    lucide.createIcons();
  } else if (gameState === 'paused') {
    gameState = 'playing';
    document.getElementById('pauseOverlay').classList.add('hidden');
    document.getElementById('answerInput').disabled = false;
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('passBtn').disabled = false;
    document.getElementById('pauseBtn').innerHTML = '<i data-lucide="pause" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i> Pausa';
    lucide.createIcons();
    document.getElementById('answerInput').focus();
  }
}

// ============= GAME FLOW =============
function startGame(roscoIdx) {
  currentRosco = roscoIdx;
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  resetGameState();
  renderRosco();
  updateTabs();
  lucide.createIcons();
}

function resetGameState() {
  gameState = 'idle';
  letterStates = ROSCOS[currentRosco].map(() => 'unanswered');
  currentIndex = 0; score = 0; corrects = 0; incorrects = 0;
  timeLeft = TOTAL_TIME;
  clearInterval(timerInterval);
  updateTimerDisplay();
  updateScores();
  document.getElementById('definitionText').innerHTML = 'Presioná <b>Iniciar</b> para comenzar';
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').disabled = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('passBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('pauseOverlay').classList.add('hidden');
}

function beginRound() {
  gameState = 'playing';
  document.getElementById('answerInput').disabled = false;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('passBtn').disabled = false;
  document.getElementById('pauseBtn').disabled = false;
  document.getElementById('startBtn').classList.add('hidden');
  currentIndex = 0;
  showCurrentLetter();
  startTimer();
}

function switchRosco(idx) {
  if (gameState === 'playing' || gameState === 'paused') {
    // Confirm inline - just switch and reset
  }
  currentRosco = idx;
  resetGameState();
  renderRosco();
  updateTabs();
}

function updateTabs() {
  for (let i = 0; i < 3; i++) {
    const btn = document.getElementById('tabBtn' + i);
    btn.className = 'tab-btn' + (i === currentRosco ? ' active' : '');
  }
}

function backToMenu() {
  clearInterval(timerInterval);
  gameState = 'idle';
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
}

function endGame() {
  gameState = 'finished';
  clearInterval(timerInterval);
  document.getElementById('answerInput').disabled = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('passBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('pauseOverlay').classList.add('hidden');
  updateRoscoVisuals();

  const overlay = document.getElementById('resultOverlay');
  const letters = ROSCOS[currentRosco];
  const total = letters.length;
  let emoji = '🏆', title = '¡Increíble!';
  if (corrects === total) { emoji = '🎉'; title = '¡Rosco perfecto!'; }
  else if (corrects >= total * 0.7) { emoji = '🌟'; title = '¡Muy bien!'; }
  else if (corrects >= total * 0.4) { emoji = '👍'; title = '¡Buen intento!'; }
  else { emoji = '💪'; title = '¡Seguí practicando!'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSummary').innerHTML =
    '<span class="text-green-400">' + corrects + ' correctas</span> · ' +
    '<span class="text-red-400">' + incorrects + ' incorrectas</span><br>' +
    'Puntaje final: <span class="text-blue-400 font-bold">' + score + '</span>';

  // Build details list
  const detailsDiv = document.getElementById('resultDetails');
  detailsDiv.innerHTML = '';

  // Incorrectas
  const incorrectLetters = letters.filter((_, i) => letterStates[i] === 'incorrect');
  if (incorrectLetters.length > 0) {
    const section = document.createElement('div');
    section.className = 'bg-red-900 bg-opacity-20 border border-red-700 rounded-lg p-4';
    section.innerHTML = '<h3 class="text-red-400 font-bold mb-2">Incorrectas (' + incorrectLetters.length + ')</h3>';
    const list = document.createElement('div');
    list.className = 'space-y-2';
    incorrectLetters.forEach(item => {
      const item_div = document.createElement('div');
      item_div.className = 'text-red-300 text-xs';
      item_div.innerHTML = '<span class="font-bold text-red-400">' + item.l + ':</span> ' + item.a;
      list.appendChild(item_div);
    });
    section.appendChild(list);
    detailsDiv.appendChild(section);
  }

  // No solucionadas
  const unsolved = letters.filter((_, i) => letterStates[i] === 'unanswered' || letterStates[i] === 'pending');
  if (unsolved.length > 0) {
    const section = document.createElement('div');
    section.className = 'bg-yellow-900 bg-opacity-20 border border-yellow-700 rounded-lg p-4';
    section.innerHTML = '<h3 class="text-yellow-400 font-bold mb-2">No solucionadas (' + unsolved.length + ')</h3>';
    const list = document.createElement('div');
    list.className = 'space-y-2';
    unsolved.forEach(item => {
      const item_div = document.createElement('div');
      item_div.className = 'text-yellow-300 text-xs';
      item_div.innerHTML = '<span class="font-bold text-yellow-400">' + item.l + ':</span> ' + item.a;
      list.appendChild(item_div);
    });
    section.appendChild(list);
    detailsDiv.appendChild(section);
  }

  overlay.classList.remove('hidden');
}

function retryRosco() {
  document.getElementById('resultOverlay').classList.add('hidden');
  resetGameState();
  renderRosco();
}

function closeResult() {
  document.getElementById('resultOverlay').classList.add('hidden');
  backToMenu();
}

// ============= EDIT ROSCO =============
let editingRoscoIdx = -1;
let editingRosco = [];

function editRosco(idx) {
  editingRoscoIdx = idx;
  editingRosco = JSON.parse(JSON.stringify(ROSCOS[idx])); // Deep copy

  document.getElementById('editTitle').textContent = 'Editar ' + roscoNames[idx];
  const editContent = document.getElementById('editContent');
  editContent.innerHTML = '';

  editingRosco.forEach((item, i) => {
    const container = document.createElement('div');
    container.className = 'bg-slate-800 rounded-lg p-4 border border-slate-700';

    const letterDiv = document.createElement('div');
    letterDiv.className = 'text-blue-400 font-bold mb-2 text-sm';
    letterDiv.textContent = 'Letra: ' + item.l;
    container.appendChild(letterDiv);

    const defLabel = document.createElement('label');
    defLabel.className = 'text-xs text-slate-400 block mb-1';
    defLabel.textContent = 'Definición:';
    container.appendChild(defLabel);

    const defInput = document.createElement('input');
    defInput.type = 'text';
    defInput.className = 'input-answer mb-3';
    defInput.value = item.d;
    defInput.dataset.field = 'def';
    defInput.dataset.index = i;
    container.appendChild(defInput);

    const ansLabel = document.createElement('label');
    ansLabel.className = 'text-xs text-slate-400 block mb-1';
    ansLabel.textContent = 'Respuesta:';
    container.appendChild(ansLabel);

    const ansInput = document.createElement('input');
    ansInput.type = 'text';
    ansInput.className = 'input-answer';
    ansInput.value = item.a;
    ansInput.dataset.field = 'ans';
    ansInput.dataset.index = i;
    container.appendChild(ansInput);

    editContent.appendChild(container);
  });

  document.getElementById('editModal').classList.remove('hidden');
  lucide.createIcons();
}

function closeEditModal() {
  document.getElementById('editModal').classList.add('hidden');
  editingRoscoIdx = -1;
  editingRosco = [];
}

function saveEditedRosco() {
  if (editingRoscoIdx < 0) return;

  const inputs = document.getElementById('editContent').querySelectorAll('input');
  inputs.forEach(inp => {
    const idx = parseInt(inp.dataset.index);
    const field = inp.dataset.field;
    if (field === 'def') editingRosco[idx].d = inp.value.trim();
    else if (field === 'ans') editingRosco[idx].a = inp.value.trim();
  });

  ROSCOS[editingRoscoIdx] = editingRosco;
  closeEditModal();
}
document.addEventListener('keydown', (e) => {
  if (gameState !== 'playing') return;
  if (e.key === 'Enter') { e.preventDefault(); submitAnswer(); }
});

// ============= ELEMENT SDK =============
const defaultConfig = {
  game_title: 'Pasapalabra',
  rosco1_title: 'Rosco 1',
  rosco2_title: 'Rosco 2',
  rosco3_title: 'Rosco 3',
  background_color: '#0a0e27',
  surface_color: '#1e293b',
  text_color: '#e2e8f0',
  primary_color: '#2563eb',
  accent_color: '#7c3aed',
  font_family: 'Outfit'
};

function applyConfig(config) {
  const title = config.game_title || defaultConfig.game_title;
  document.getElementById('gameTitle').textContent = title;

  roscoNames[0] = config.rosco1_title || defaultConfig.rosco1_title;
  roscoNames[1] = config.rosco2_title || defaultConfig.rosco2_title;
  roscoNames[2] = config.rosco3_title || defaultConfig.rosco3_title;

  for (let i = 0; i < 3; i++) {
    const btn = document.getElementById('roscoBtn' + i);
    const tab = document.getElementById('tabName' + i);
    if (btn) btn.textContent = roscoNames[i];
    if (tab) tab.textContent = roscoNames[i];
  }

  const bg = config.background_color || defaultConfig.background_color;
  document.querySelector('.app-wrapper').style.background = 'radial-gradient(ellipse at 50% 0%, ' + bg + '44, ' + bg + ')';

  const txt = config.text_color || defaultConfig.text_color;
  document.body.style.color = txt;

  const font = config.font_family || defaultConfig.font_family;
  document.body.style.fontFamily = font + ', Outfit, sans-serif';
  document.getElementById('gameTitle').style.fontFamily = font + ', Outfit, sans-serif';
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => { applyConfig(config); },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
      { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ['game_title', config.game_title || defaultConfig.game_title],
    ['rosco1_title', config.rosco1_title || defaultConfig.rosco1_title],
    ['rosco2_title', config.rosco2_title || defaultConfig.rosco2_title],
    ['rosco3_title', config.rosco3_title || defaultConfig.rosco3_title]
  ])
});

// ============= INIT =============
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  applyConfig(defaultConfig);
});

// Handle resize
window.addEventListener('resize', () => {
  if (!document.getElementById('gameScreen').classList.contains('hidden')) renderRosco();
});
